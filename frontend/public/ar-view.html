<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR View Anti-Neck</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
        // --- KOMPONEN OVERPOWER UNTUK TEKS ---
        AFRAME.registerComponent('always-on-top', {
            init: function () {
                this.el.addEventListener('textfontset', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.material.depthTest = false; 
                        mesh.material.transparent = true;
                        mesh.renderOrder = 9999; 
                    }
                });
            }
        });

        // --- KOMPONEN GESTURE HANDLER (ROTASI X/Y & ZOOM) ---
        AFRAME.registerComponent('gesture-handler', {
            init: function () {
                this.isDragging = false;
                this.previousMousePosition = { x: 0, y: 0 };
                this.initialDistance = 0;
                this.initialScale = { x: 1, y: 1, z: 1 };
                
                // MOUSE EVENTS (PC) - Rotasi X dan Y
                document.addEventListener('mousedown', (e) => { 
                    this.isDragging = true; 
                    this.previousMousePosition = { x: e.offsetX, y: e.offsetY }; 
                });
                document.addEventListener('mouseup', () => { this.isDragging = false; });
                document.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const deltaX = e.offsetX - this.previousMousePosition.x;
                        const deltaY = e.offsetY - this.previousMousePosition.y;
                        const currentRotation = this.el.getAttribute('rotation');
                        
                        // Rotasi: Sumbu X (atas/bawah) dan Sumbu Y (kanan/kiri)
                        this.el.setAttribute('rotation', {
                            x: currentRotation.x + deltaY * 0.5, 
                            y: currentRotation.y + deltaX * 0.8, 
                            z: currentRotation.z  
                        });
                        this.previousMousePosition = { x: e.offsetX, y: e.offsetY };
                    }
                });

                // SCROLL WHEEL (PC) - Zoom In/Out
                document.addEventListener('wheel', (e) => {
                    e.preventDefault(); // Mencegah scrolling halaman
                    const scaleFactor = e.deltaY > 0 ? 0.9 : 1.1; // Scroll bawah = kecil, atas = besar
                    const currentScale = this.el.getAttribute('scale');
                    
                    // Batasi zoom (minimal 0.5x, maksimal 3x)
                    let newScaleX = currentScale.x * scaleFactor;
                    newScaleX = Math.max(0.5, Math.min(newScaleX, 3)); 
                    
                    this.el.setAttribute('scale', `${newScaleX} ${newScaleX} ${newScaleX}`);
                }, { passive: false });

                // TOUCH EVENTS (Mobile) - Pinch Zoom & Rotasi X/Y
                document.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) { // 1 Jari = Drag (Rotasi)
                        this.isDragging = true;
                        this.previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                    } else if (e.touches.length === 2) { // 2 Jari = Pinch (Zoom)
                        this.isDragging = false; // Matikan drag saat zoom
                        this.initialDistance = this.getDistance(e.touches);
                        this.initialScale = this.el.getAttribute('scale');
                    }
                });

                document.addEventListener('touchend', () => { this.isDragging = false; });

                document.addEventListener('touchmove', (e) => {
                    if (this.isDragging && e.touches.length === 1) { // Logic Rotasi 1 Jari
                        const deltaX = e.touches[0].pageX - this.previousMousePosition.x;
                        const deltaY = e.touches[0].pageY - this.previousMousePosition.y;
                        const currentRotation = this.el.getAttribute('rotation');
                        
                        this.el.setAttribute('rotation', {
                            x: currentRotation.x + deltaY * 0.5,
                            y: currentRotation.y + deltaX * 0.8,
                            z: currentRotation.z
                        });
                        this.previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                    } 
                    else if (e.touches.length === 2) { // Logic Zoom Pinch 2 Jari
                        e.preventDefault(); // Mencegah layar ter-zoom native browser
                        const currentDistance = this.getDistance(e.touches);
                        const scaleFactor = currentDistance / this.initialDistance;
                        
                        // Batasi zoom (minimal 0.5x, maksimal 3x dari skala AWAL PINCH)
                        let newScaleX = this.initialScale.x * scaleFactor;
                        newScaleX = Math.max(0.5, Math.min(newScaleX, 3));

                        this.el.setAttribute('scale', `${newScaleX} ${newScaleX} ${newScaleX}`);
                    }
                }, { passive: false });
            },

            // Fungsi pembantu untuk menghitung jarak antar 2 jari (Pinch)
            getDistance: function(touches) {
                const dx = touches[0].pageX - touches[1].pageX;
                const dy = touches[0].pageY - touches[1].pageY;
                return Math.sqrt(dx * dx + dy * dy);
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden; background-color: black;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: false; sortObjects: true;"
        vr-mode-ui="enabled: false"
    >
        <a-assets>
            <a-asset-item id="anatomy" src="/models/thyrohyoid.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="model-wrapper" rotation="0 0 0" scale="1 1 1" gesture-handler>
                
                <a-entity 
                    gltf-model="#anatomy" 
                    scale="0.015 0.015 0.015" 
                    position="0 0 0"
                    rotation="0 180 0">
                </a-entity>

                <a-entity id="therapy-point" position="0 0 0">
                    <a-sphere radius="0.04" material="color: #00FFFF; shader: flat;" 
                              animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true"></a-sphere>
                    <a-sphere radius="0.07" material="color: #00FFFF; opacity: 0.3; transparent: true; shader: flat; side: double;"
                              animation="property: scale; to: 1.6 1.6 1.6; dir: alternate; dur: 500; loop: true"></a-sphere>
                </a-entity>

                <a-text 
                    id="therapy-label" 
                    position="0 5 0.6" 
                    align="center" 
                    color="#00FFFF" 
                    width="5"
                    always-on-top>
                </a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const recommendation = urlParams.get('rec') || 'Tidak Diketahui';
        const point = document.getElementById('therapy-point');
        const label = document.getElementById('therapy-label');

        // === POSISI 6 TITIK TERAPI ===
        if (recommendation === 'Levator Scapulae') {
            point.setAttribute('position', '0 2.2 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Upper Trapezius') {
            point.setAttribute('position', '0 2 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Quadratus Lumborum') {
            point.setAttribute('position', '0 1.6 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Splenius Capitis') {
            point.setAttribute('position', '0 2.35 0.15'); 
            label.setAttribute('position', '0 2.85 0'); 
        } else if (recommendation === 'Rhomboid Major') {
            point.setAttribute('position', '0 1.85 0.25'); 
            label.setAttribute('position', '0 2.5 0'); 
        } else if (recommendation === 'Erector Spinae') {
            point.setAttribute('position', '0 1.4 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        }
        
        label.setAttribute('value', "TITIK: " + recommendation);
    </script>
</body>
</html>

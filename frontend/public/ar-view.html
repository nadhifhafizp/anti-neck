<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR View Anti-Neck</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: black;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: false;"
        vr-mode-ui="enabled: false"
    >
        <a-assets>
            <a-asset-item id="anatomy" src="/models/thyrohyoid.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="model-wrapper" rotation="0 0 0">
                <a-entity 
                    gltf-model="#anatomy" 
                    scale="0.015 0.015 0.015" 
                    position="0 0 0"
                    rotation="0 180 0">
                </a-entity>

                <a-sphere 
                    id="therapy-point"
                    radius="0.06" 
                    color="#EF4444"
                    animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 600; loop: true">
                </a-sphere>

                <a-text id="therapy-label" position="0 1.8 0" align="center" color="#EF4444" width="4"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- LOGIKA DINAMIS TITIK TERAPI ---
        const urlParams = new URLSearchParams(window.location.search);
        const recommendation = urlParams.get('rec') || 'Tidak Diketahui';
        const point = document.getElementById('therapy-point');
        const label = document.getElementById('therapy-label');

        if (recommendation === 'Levator Scapulae') {
            point.setAttribute('position', '0 2.2 0.1'); 
        } else if (recommendation === 'Upper Trapezius') {
            point.setAttribute('position', '0.25 2 0.1'); 
        } else if (recommendation === 'Quadratus Lumborum') {
            point.setAttribute('position', '0 1.6 0.1'); 
        }
        label.setAttribute('value', "TITIK: " + recommendation);

        // --- LOGIKA ROTASI MANUAL (DRAG TO ROTATE) ---
        const wrapper = document.getElementById('model-wrapper');
        let isDragging = false;
        let previousMouseX = 0;

        // Mendeteksi klik/sentuh mulai
        const startDrag = (e) => {
            isDragging = true;
            previousMouseX = e.touches ? e.touches[0].clientX : e.clientX;
        };

        // Mendeteksi pergerakan mouse/jari
        const doDrag = (e) => {
            if (!isDragging) return;
            
            const currentX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = currentX - previousMouseX;
            
            // Ambil rotasi saat ini
            let currentRotation = wrapper.getAttribute('rotation');
            // Putar hanya pada sumbu Y (horisontal)
            currentRotation.y += deltaX * 0.5; 
            
            wrapper.setAttribute('rotation', currentRotation);
            previousMouseX = currentX;
        };

        const stopDrag = () => { isDragging = false; };

        // Pasang listener ke seluruh window agar mudah diputar
        window.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', stopDrag);
        
        // Support Layar Sentuh (HP)
        window.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', doDrag);
        window.addEventListener('touchend', stopDrag);
    </script>
</body>
</html>

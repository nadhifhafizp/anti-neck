<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR View Anti-Neck</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
        // --- KOMPONEN OVERPOWER: SELALU DI ATAS ---
        AFRAME.registerComponent('always-on-top', {
            init: function () {
                this.el.addEventListener('textfontset', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (mesh) {
                        mesh.material.depthTest = false; 
                        mesh.material.transparent = true;
                        mesh.renderOrder = 9999; 
                    }
                });
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden; background-color: black;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: false; sortObjects: true;"
        vr-mode-ui="enabled: false"
    >
        <a-assets>
            <a-asset-item id="anatomy" src="/models/thyrohyoid.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="model-wrapper" rotation="0 0 0">
                <a-entity 
                    gltf-model="#anatomy" 
                    scale="0.015 0.015 0.015" 
                    position="0 0 0"
                    rotation="0 180 0">
                </a-entity>

                <a-entity id="therapy-point" position="0 0 0">
                    <a-sphere radius="0.04" material="color: #00FFFF; shader: flat;" 
                              animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true"></a-sphere>
                    <a-sphere radius="0.07" material="color: #00FFFF; opacity: 0.3; transparent: true; shader: flat; side: double;"
                              animation="property: scale; to: 1.6 1.6 1.6; dir: alternate; dur: 500; loop: true"></a-sphere>
                </a-entity>

                <a-text 
                    id="therapy-label" 
                    position="0 5 0.6" 
                    align="center" 
                    color="#00FFFF" 
                    width="5"
                    always-on-top>
                </a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const recommendation = urlParams.get('rec') || 'Tidak Diketahui';
        const point = document.getElementById('therapy-point');
        const label = document.getElementById('therapy-label');

        // === POSISI 6 TITIK TERAPI ===
        if (recommendation === 'Levator Scapulae') {
            point.setAttribute('position', '0 2.2 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Upper Trapezius') {
            point.setAttribute('position', '0 2 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Quadratus Lumborum') {
            point.setAttribute('position', '0 1.6 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        } else if (recommendation === 'Splenius Capitis') {
            point.setAttribute('position', '0 2.35 0.15'); 
            label.setAttribute('position', '0 2.85 0'); 
        } else if (recommendation === 'Rhomboid Major') {
            point.setAttribute('position', '0 1.85 0.25'); 
            label.setAttribute('position', '0 2.5 0'); 
        } else if (recommendation === 'Erector Spinae') {
            point.setAttribute('position', '0 1.4 0.2'); 
            label.setAttribute('position', '0 2.7 0'); 
        }
        
        label.setAttribute('value', "TITIK: " + recommendation);
        
        // === LOGIKA ROTASI YANG DIPERBAIKI (ANTI-MIRING) ===
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const modelWrapper = document.getElementById('model-wrapper');

        // Mouse Events (Untuk Komputer)
        document.addEventListener('mousedown', (e) => { 
            isDragging = true; 
            previousMousePosition = { x: e.offsetX, y: e.offsetY }; 
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.offsetX - previousMousePosition.x;
                const currentRotation = modelWrapper.getAttribute('rotation');
                
                // HANYA sumbu Y yang diubah agar model berputar ke kiri/kanan. 
                // Sumbu X dan Z dikunci ke 0 agar badan selalu tegak lurus.
                modelWrapper.setAttribute('rotation', {
                    x: 0, 
                    y: currentRotation.y + deltaX * 0.8, 
                    z: 0  
                });
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            }
        });

        // Touch Events (Untuk Layar Sentuh / HP)
        document.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        });
        document.addEventListener('touchend', () => { isDragging = false; });
        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaX = e.touches[0].pageX - previousMousePosition.x;
                const currentRotation = modelWrapper.getAttribute('rotation');
                
                // Sama seperti Mouse, hanya sumbu Y yang dirotasi
                modelWrapper.setAttribute('rotation', {
                    x: 0,
                    y: currentRotation.y + deltaX * 0.8,
                    z: 0
                });
                previousMousePosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            }
        });
    </script>
</body>
</html>
